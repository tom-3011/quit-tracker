<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smoke-Free — Quit Tracker</title>
<style>
  :root {
    --bg: #17151a;
    --surface: #221f26;
    --surface2: #2b2830;
    --text: #F2EDE4;
    --muted: #8A8580;
    --ember: #F0562B;
    --heal: #4FB89E;
    --rose: #E8A0A0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    min-height: 100vh;
  }
  .page { max-width: 480px; margin: 0 auto; padding: 28px 20px 50px; }
  .serif { font-family: Georgia, 'Iowan Old Style', serif; }
  .muted { color: var(--muted); font-size: 13.5px; }
  .hidden { display: none !important; }

  #onboard-screen { text-align: center; padding-top: 40px; }
  #onboard-screen h1 { font-size: 30px; margin: 14px 0 4px; font-family: Georgia, serif; }
  .form-card { text-align: left; max-width: 340px; margin: 0 auto; }
  label { display: block; text-align: left; font-size: 12.5px; color: var(--muted); margin-bottom: 6px; }
  input {
    width: 100%; box-sizing: border-box; background: var(--surface); color: var(--text);
    border: none; border-radius: 10px; padding: 12px 14px; font-size: 15px; margin-bottom: 14px;
  }
  .pill-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .pill { background: var(--surface); color: var(--muted); border: none; border-radius: 10px; padding: 10px 14px; font-size: 13px; cursor: pointer; flex: 1; }
  .pill.active { background: var(--heal); color: #0d0d0d; font-weight: 700; }
  .btn-primary { width: 100%; background: var(--heal); color: #0d0d0d; border: none; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; }

  .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .header-label { font-size: 13px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; }
  #lungs-wrap { text-align: center; margin: 10px 0; }
  .counter-wrap { text-align: center; margin: 10px 0 20px; }
  .counter-big { font-weight: 700; font-size: 76px; line-height: 1; }
  .counter-sub { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 15px; color: var(--muted); margin-top: 6px; letter-spacing: 0.5px; }
  .stats-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .stat-card { flex: 1; background: var(--surface); border-radius: 14px; padding: 14px 8px; text-align: center; }
  .stat-num { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 17px; font-weight: 600; margin: 6px 0 2px; }
  .stat-label { font-size: 11px; color: var(--muted); }
  .sos-btn { width: 100%; background: var(--ember); color: #1a1a1a; border: none; border-radius: 14px; padding: 16px 12px; font-size: 15px; font-weight: 700; margin-bottom: 28px; cursor: pointer; }
  .section-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .section-title { font-size: 17px; font-weight: 700; }
  .badge-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .badge { background: var(--surface); border-radius: 12px; padding: 10px 12px; text-align: center; min-width: 68px; transition: opacity 0.6s ease; }
  .badge-emoji { font-size: 22px; }
  .badge-label { font-size: 9px; color: var(--muted); margin-top: 4px; line-height: 1.2; }
  .timeline { display: flex; flex-direction: column; gap: 12px; }
  .timeline-row { display: flex; align-items: flex-start; gap: 10px; }
  .timeline-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--muted); margin-top: 4px; flex-shrink: 0; transition: background 0.8s ease; }
  .timeline-text { font-size: 13.5px; line-height: 1.4; transition: opacity 0.8s ease; }
  .reset-btn { display: flex; align-items: center; gap: 6px; justify-content: center; width: 100%; background: transparent; color: var(--muted); border: 1px solid var(--surface); border-radius: 10px; padding: 10px; font-size: 12px; margin-top: 10px; cursor: pointer; }

  .quip-card {
    background: var(--surface);
    border-radius: 14px;
    padding: 14px 16px;
    font-size: 13.5px;
    text-align: center;
    color: var(--rose);
    margin-bottom: 20px;
    font-style: italic;
    transition: opacity 0.4s ease;
  }
  .funfact-card {
    background: var(--surface2);
    border-left: 3px solid var(--heal);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13px;
    color: var(--text);
    margin-top: 10px;
    transition: opacity 0.4s ease;
  }
  .confetti-piece {
    position: fixed;
    top: -30px;
    font-size: 22px;
    pointer-events: none;
    z-index: 100;
    animation: confetti-fall linear forwards;
  }
  @keyframes confetti-fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(105vh) rotate(360deg); opacity: 0.9; }
  }
  .celebration-toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--heal);
    color: #0d0d0d;
    padding: 12px 22px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 14px;
    z-index: 101;
    animation: toast-in-out 3.5s ease forwards;
    white-space: nowrap;
  }
  @keyframes toast-in-out {
    0% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
    12% { opacity: 1; transform: translateX(-50%) translateY(0); }
    85% { opacity: 1; transform: translateX(-50%) translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  }

  .modal-overlay { position: fixed; inset: 0; background: rgba(10,9,11,0.92); display: flex; align-items: center; justify-content: center; z-index: 50; }
  .modal-card { position: relative; background: var(--surface); border-radius: 20px; padding: 32px 24px; text-align: center; width: 85%; max-width: 340px; }
  .close-btn { position: absolute; top: 14px; right: 14px; background: none; border: none; color: var(--text); font-size: 18px; cursor: pointer; }
  .breath-circle-wrap { position: relative; width: 160px; height: 160px; margin: 20px auto; display: flex; align-items: center; justify-content: center; }
  .breath-circle { position: absolute; width: 90px; height: 90px; border-radius: 50%; background: var(--heal); opacity: 0.85; transition: transform 4s ease-in-out; }
  .breath-text { position: relative; font-size: 14px; font-weight: 600; color: #0d0d0d; z-index: 2; }
</style>
</head>
<body>
<div class="page">

  <!-- Loading screen while quitdate.txt is fetched -->
  <div id="onboard-screen">
    <div style="font-size:36px;">🫁</div>
    <p class="muted">Loading your quit data from quitdate.txt…</p>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard-screen" class="hidden">
    <div class="header-row">
      <span class="header-label">🌬️ Smoke-free</span>
    </div>

    <div id="lungs-wrap">
      <svg width="140" height="120" viewBox="0 0 140 120">
        <path d="M70 10 L70 45" stroke="#8A8580" stroke-width="4" stroke-linecap="round"/>
        <path id="lung-left" d="M70 45 C 40 40, 15 55, 15 85 C 15 105, 35 112, 45 100 C 52 90, 50 60, 62 50 Z" fill="#5B5550" style="transition: fill 1.2s ease;"/>
        <path id="lung-right" d="M70 45 C 100 40, 125 55, 125 85 C 125 105, 105 112, 95 100 C 88 90, 90 60, 78 50 Z" fill="#5B5550" style="transition: fill 1.2s ease;"/>
        <circle cx="35" cy="75" r="3" fill="#17151a" opacity="0.4"/>
        <circle cx="50" cy="90" r="2.5" fill="#17151a" opacity="0.4"/>
        <circle cx="105" cy="75" r="3" fill="#17151a" opacity="0.4"/>
        <circle cx="90" cy="90" r="2.5" fill="#17151a" opacity="0.4"/>
      </svg>
    </div>

    <div class="counter-wrap">
      <div class="counter-big serif" id="days-count">0</div>
      <div class="counter-sub" id="time-sub">00:00:00</div>
    </div>

    <div class="stats-row">
      <div class="stat-card"><div>🔥</div><div class="stat-num" id="stat-cigs">0</div><div class="stat-label">not smoked</div></div>
      <div class="stat-card"><div>₹</div><div class="stat-num" id="stat-money">₹0</div><div class="stat-label">saved</div></div>
      <div class="stat-card"><div>❤️</div><div class="stat-num" id="stat-cravings">0</div><div class="stat-label">cravings beaten</div></div>
    </div>

    <button class="sos-btn" id="sos-btn">Craving hitting now? Breathe through it</button>

    <div class="quip-card" id="quip-card">🫁 Loading a fresh dose of amusement…</div>

    <div class="section">
      <div class="section-title-row"><span>🏆</span><span class="section-title">Badges</span></div>
      <div class="badge-row" id="badge-row"></div>
      <p class="muted" id="next-badge-text"></p>
    </div>

    <div class="section">
      <div class="section-title-row"><span>✨</span><span class="section-title">Your body's timeline</span></div>
      <div class="timeline" id="timeline-list"></div>
    </div>

    <div class="funfact-card" id="funfact-card"></div>
  </div>
</div>

<!-- Breathing modal -->
<div id="breathing-modal" class="modal-overlay hidden">
  <div class="modal-card">
    <button class="close-btn" id="breathing-close">✕</button>
    <p class="muted">The craving will pass in a few minutes. Ride it out.</p>
    <div class="breath-circle-wrap">
      <div class="breath-circle" id="breath-circle"></div>
      <span class="breath-text" id="breath-text">Breathe in</span>
    </div>
    <p class="muted" id="breath-timer" style="margin-top:18px;">45s left</p>
  </div>
</div>

<script>
const STORAGE_KEY = 'quit-smoking-data-v1';
// Fallbacks used only if quitdate.txt can't be read (e.g. opened as a local file:// page)
const FALLBACK_QUIT_AT = new Date(2026, 6, 6, 8, 14, 18).getTime();
const FALLBACK_CIGS_PER_DAY = 5;
const FALLBACK_COST_PER_CIG = 25;
let QUIT_AT = FALLBACK_QUIT_AT;
let CIGS_PER_DAY = FALLBACK_CIGS_PER_DAY;
let COST_PER_CIG = FALLBACK_COST_PER_CIG;

async function loadQuitDateFromFile() {
  try {
    const res = await fetch('quitdate.txt', { cache: 'no-store' });
    if (!res.ok) throw new Error('file not found');
    const lines = (await res.text()).trim().split('\n').map(l => l.trim());
    const parsedDate = new Date(lines[0]).getTime();
    if (!isNaN(parsedDate)) QUIT_AT = parsedDate;
    if (lines[1] !== undefined && !isNaN(Number(lines[1]))) CIGS_PER_DAY = Number(lines[1]);
    if (lines[2] !== undefined && !isNaN(Number(lines[2]))) COST_PER_CIG = Number(lines[2]);
  } catch (e) {
    console.warn('Could not read quitdate.txt, using fallback values.', e);
  }
}

const BADGES = [
  { days: 0, label: "Day One", emoji: "🌱" },
  { days: 1, label: "24 Hours", emoji: "🌙" },
  { days: 3, label: "3 Days Clean", emoji: "💪" },
  { days: 7, label: "One Week", emoji: "🔥" },
  { days: 14, label: "Two Weeks", emoji: "🫁" },
  { days: 30, label: "One Month", emoji: "🌸" },
  { days: 90, label: "90 Days", emoji: "🌳" },
  { days: 180, label: "Half a Year", emoji: "🦁" },
  { days: 365, label: "One Year", emoji: "🏆" },
];

const TIMELINE = [
  { hours: 0.33, label: "Heart rate and blood pressure start dropping" },
  { hours: 12, label: "Carbon monoxide in your blood returns to normal" },
  { hours: 24, label: "Heart attack risk begins to decrease" },
  { hours: 48, label: "Nerve endings regrow — smell and taste sharpen" },
  { hours: 72, label: "Breathing feels easier, energy starts rising" },
  { hours: 24 * 14, label: "Circulation and lung function noticeably improve" },
  { hours: 24 * 30 * 3, label: "Coughing and shortness of breath fade" },
  { hours: 24 * 365, label: "Heart disease risk is half that of a smoker" },
];

const QUIPS = [
  "Somewhere, a lighter is filing for unemployment.",
  "Your lungs just did a tiny, dramatic happy dance.",
  "A cigarette tried to text you. It got left on read.",
  "Fun fact: ashtrays are extremely bored right now.",
  "Your future self just gave you a quiet high-five.",
  "You are currently 100% less smoke, 100% more legend.",
  "Somewhere a pack of cigarettes is gathering dust and feelings.",
  "Your circulatory system sent a thank-you card. It's in the mail.",
  "Breaking news: local lungs report unexpected joy.",
  "You've out-stubborn-ed a nicotine molecule today. Respect.",
  "Your wallet just felt a small, pleasant tremor.",
  "This is the part of the movie where the hero looks cool in slow motion. That's you.",
  "Somewhere, a tar deposit is being quietly evicted.",
  "Your smoke detector has never been less interested in you.",
  "Even your coffee tastes a little more like coffee now.",
];

let quipIndex = Math.floor(Math.random() * QUIPS.length);
let quipInterval = null;

function showNextQuip() {
  const el = document.getElementById('quip-card');
  el.style.opacity = 0;
  setTimeout(() => {
    quipIndex = (quipIndex + 1) % QUIPS.length;
    el.textContent = '💬 ' + QUIPS[quipIndex];
    el.style.opacity = 1;
  }, 400);
}

function funFacts(days, hours, mins, elapsedHours, cigsAvoided, moneySaved) {
  const chaiCount = Math.floor(moneySaved / 15);
  const parottaCount = Math.floor(moneySaved / 20);
  const movieMinutes = Math.floor(elapsedHours * 60 / 148); // ~148 min avg movie
  const breathsSaved = Math.floor(cigsAvoided * 12); // rough breaths per cigarette break lost to smoke
  const facts = [
    `₹${moneySaved} saved so far — that's about ${chaiCount} cups of chai you could've had instead.`,
    `${cigsAvoided} cigarettes avoided — roughly ${breathsSaved} fewer smoke-filled breaths for those lungs of yours.`,
    moneySaved >= 20 ? `You could've bought ${parottaCount} parottas with what you've saved. Priorities, honestly.` : `Give it a few more hours and the parotta math starts getting interesting.`,
    movieMinutes >= 1 ? `You've been smoke-free for roughly ${movieMinutes} movie-length sitting${movieMinutes === 1 ? '' : 's'} worth of time.` : `You've been smoke-free for ${Math.floor(elapsedHours*60)} minutes — a solid chai-break's worth already.`,
    `At this pace, in a year you'll have skipped roughly ${Math.floor(cigsAvoided * 365 / Math.max(days,1))} cigarettes annually. Future you says thanks.`,
  ];
  return facts[Math.floor(Math.random() * facts.length)];
}

let seenBadges = [];
try {
  const storedSeen = localStorage.getItem('quit-seen-badges');
  if (storedSeen) seenBadges = JSON.parse(storedSeen);
} catch (e) {}

function celebrate(badgeLabel, emoji) {
  const toast = document.createElement('div');
  toast.className = 'celebration-toast';
  toast.textContent = `${emoji} Unlocked: ${badgeLabel}!`;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3600);

  const pieces = ['🎉', '🫁', '🌟', '💪', emoji];
  for (let i = 0; i < 24; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.textContent = pieces[Math.floor(Math.random() * pieces.length)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (2 + Math.random() * 1.5) + 's';
    p.style.fontSize = (16 + Math.random() * 14) + 'px';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 4000);
  }
}

function checkBadgeCelebration(days) {
  const hit = BADGES.find(b => b.days === days);
  if (hit && !seenBadges.includes(hit.days)) {
    seenBadges.push(hit.days);
    try { localStorage.setItem('quit-seen-badges', JSON.stringify(seenBadges)); } catch (e) {}
    celebrate(hit.label, hit.emoji);
  }
}

let accountData = null;
let tickInterval = null;
let breathPhaseInterval = null;
let breathTickInterval = null;

function lungColor(days) {
  const t = Math.min(days / 90, 1);
  const from = [91, 85, 80];
  const to = [232, 160, 160];
  const c = from.map((v, i) => Math.round(v + (to[i] - v) * t));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}

function formatDuration(ms) {
  const totalSec = Math.floor(ms / 1000);
  const days = Math.floor(totalSec / 86400);
  const hours = Math.floor((totalSec % 86400) / 3600);
  const mins = Math.floor((totalSec % 3600) / 60);
  const secs = totalSec % 60;
  return { days, hours, mins, secs };
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(accountData));
  } catch (e) { console.error('save failed', e); }
}

function enterDashboard() {
  document.getElementById('onboard-screen').classList.add('hidden');
  document.getElementById('dashboard-screen').classList.remove('hidden');
  document.getElementById('quip-card').textContent = '💬 ' + QUIPS[quipIndex];
  tick();
  if (tickInterval) clearInterval(tickInterval);
  tickInterval = setInterval(tick, 1000);
  if (quipInterval) clearInterval(quipInterval);
  quipInterval = setInterval(showNextQuip, 15000);
}

let lastFunFactUpdate = 0;

function tick() {
  const now = Date.now();
  const elapsedMs = Math.max(0, now - accountData.quitAt);
  const { days, hours, mins, secs } = formatDuration(elapsedMs);
  const elapsedHours = elapsedMs / 3600000;
  const cigsAvoided = Math.floor((elapsedHours / 24) * accountData.cigsPerDay);
  const moneySaved = Math.round(cigsAvoided * accountData.costPerCig);

  document.getElementById('days-count').textContent = days;
  document.getElementById('time-sub').textContent =
    `${String(hours).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
  document.getElementById('stat-cigs').textContent = cigsAvoided;
  document.getElementById('stat-money').textContent = '₹' + moneySaved.toLocaleString('en-IN');
  document.getElementById('stat-cravings').textContent = accountData.cravings.length;

  const color = lungColor(days);
  document.getElementById('lung-left').setAttribute('fill', color);
  document.getElementById('lung-right').setAttribute('fill', color);

  renderBadges(days);
  renderTimeline(elapsedHours);
  checkBadgeCelebration(days);

  if (now - lastFunFactUpdate > 10000) {
    lastFunFactUpdate = now;
    const factEl = document.getElementById('funfact-card');
    factEl.style.opacity = 0;
    setTimeout(() => {
      factEl.textContent = '✨ ' + funFacts(days, hours, mins, elapsedHours, cigsAvoided, moneySaved);
      factEl.style.opacity = 1;
    }, 300);
  }
}

function renderBadges(days) {
  days = days || 0;
  const row = document.getElementById('badge-row');
  row.innerHTML = '';
  BADGES.forEach(b => {
    const unlocked = b.days <= days;
    const el = document.createElement('div');
    el.className = 'badge';
    el.style.opacity = unlocked ? '1' : '0.25';
    el.style.filter = unlocked ? 'none' : 'grayscale(1)';
    el.title = b.label;
    el.innerHTML = `<div class="badge-emoji">${b.emoji}</div><div class="badge-label">${b.label}</div>`;
    row.appendChild(el);
  });
  const next = BADGES.find(b => b.days > days);
  document.getElementById('next-badge-text').textContent = next
    ? `${next.days - days} day${next.days - days === 1 ? '' : 's'} to "${next.label}" ${next.emoji}`
    : 'All badges unlocked 🎉';
}

function renderTimeline(elapsedHours) {
  elapsedHours = elapsedHours || 0;
  const list = document.getElementById('timeline-list');
  list.innerHTML = '';
  TIMELINE.forEach(m => {
    const done = elapsedHours >= m.hours;
    const row = document.createElement('div');
    row.className = 'timeline-row';
    row.innerHTML = `
      <div class="timeline-dot" style="background:${done ? 'var(--heal)' : 'var(--surface)'}; border-color:${done ? 'var(--heal)' : 'var(--muted)'};"></div>
      <span class="timeline-text" style="opacity:${done ? 1 : 0.5};">${m.label}</span>
    `;
    list.appendChild(row);
  });
}

document.getElementById('sos-btn').onclick = () => {
  document.getElementById('breathing-modal').classList.remove('hidden');
  startBreathing();
};

document.getElementById('breathing-close').onclick = () => stopBreathing(false);

function startBreathing() {
  let seconds = 45;
  let phaseIdx = 0;
  const phases = ['in', 'hold', 'out'];
  const circle = document.getElementById('breath-circle');
  const text = document.getElementById('breath-text');
  const timerEl = document.getElementById('breath-timer');

  function applyPhase() {
    const phase = phases[phaseIdx];
    if (phase === 'in') { circle.style.transform = 'scale(1.4)'; text.textContent = 'Breathe in'; }
    else if (phase === 'hold') { circle.style.transform = 'scale(1.4)'; text.textContent = 'Hold'; }
    else { circle.style.transform = 'scale(0.85)'; text.textContent = 'Breathe out'; }
  }
  applyPhase();

  breathPhaseInterval = setInterval(() => {
    phaseIdx = (phaseIdx + 1) % 3;
    applyPhase();
  }, 4000);

  breathTickInterval = setInterval(() => {
    seconds -= 1;
    timerEl.textContent = seconds + 's left';
    if (seconds <= 0) stopBreathing(true);
  }, 1000);
}

function stopBreathing(completed) {
  clearInterval(breathPhaseInterval);
  clearInterval(breathTickInterval);
  document.getElementById('breathing-modal').classList.add('hidden');
  if (completed) {
    accountData.cravings.push(Date.now());
    saveData();
    tick();
  }
}

// Init: load quit date, cigs/day, and cost from file; keep only craving history in localStorage
(async () => {
  await loadQuitDateFromFile();
  const saved = loadData();
  accountData = {
    quitAt: QUIT_AT,
    cigsPerDay: CIGS_PER_DAY,
    costPerCig: COST_PER_CIG,
    cravings: (saved && Array.isArray(saved.cravings)) ? saved.cravings : [],
  };
  enterDashboard();
})();
</script>
</body>
</html>
